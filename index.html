<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>write.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --fg: #d4d4d4;
    --dim: #555;
    --accent: #d4d4d4;
    --font: 'Geist Mono', 'Courier New', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font);
    font-weight: 300;
    font-size: 15px;
    line-height: 1.7;
  }

  /* ── password screen ── */
  #lock {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    z-index: 10;
    background: var(--bg);
    transition: opacity .3s ease;
  }

  #lock.hide {
    opacity: 0;
    pointer-events: none;
  }

  #lock-label {
    font-size: 11px;
    letter-spacing: .15em;
    color: var(--dim);
    margin-bottom: 18px;
    text-transform: lowercase;
  }

  #pw {
    background: none;
    border: none;
    border-bottom: 1px solid var(--dim);
    color: var(--fg);
    font-family: var(--font);
    font-size: 15px;
    font-weight: 300;
    width: 220px;
    text-align: center;
    outline: none;
    padding: 6px 0;
    letter-spacing: .1em;
    caret-color: var(--fg);
    transition: border-color .2s;
  }

  #pw:focus { border-color: var(--fg); }

  #pw-err {
    font-size: 11px;
    color: var(--dim);
    margin-top: 14px;
    letter-spacing: .05em;
    opacity: 0;
    transition: opacity .2s;
  }

  #pw-err.show { opacity: 1; }

  /* ── editor screen ── */
  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s ease;
  }

  #app.show {
    opacity: 1;
    pointer-events: all;
  }

  #editor {
    flex: 1;
    width: 100%;
    background: none;
    border: none;
    color: var(--fg);
    font-family: var(--font);
    font-size: 15px;
    font-weight: 300;
    line-height: 1.85;
    resize: none;
    outline: none;
    padding: 60px 48px;
    caret-color: var(--fg);
  }

  @media (max-width: 600px) {
    #editor { padding: 40px 24px; }
  }

  #bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 48px;
    border-top: 1px solid #1e1e1e;
  }

  @media (max-width: 600px) {
    #bar { padding: 12px 24px; }
  }

  #word-count {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: .08em;
  }

  #actions {
    display: flex;
    gap: 20px;
  }

  .action-btn {
    font-family: var(--font);
    font-size: 11px;
    font-weight: 300;
    color: var(--dim);
    background: none;
    border: none;
    cursor: pointer;
    letter-spacing: .08em;
    padding: 0;
    transition: color .15s;
  }

  .action-btn:hover { color: var(--fg); }

  /* blinking caret placeholder */
  #editor::placeholder { color: #333; }
</style>
</head>
<body>

<!-- lock screen -->
<div id="lock">
  <div id="lock-label">enter password</div>
  <input id="pw" type="password" autocomplete="off" autocorrect="off" spellcheck="false" autofocus />
  <div id="pw-err">wrong password</div>
</div>

<!-- editor -->
<div id="app">
  <textarea id="editor" placeholder="start writing..." spellcheck="false" autocorrect="off" autocomplete="off"></textarea>
  <div id="bar">
    <span id="word-count">0 words</span>
    <div id="actions">
      <button class="action-btn" id="btn-copy">copy</button>
      <button class="action-btn" id="btn-clear">clear</button>
      <button class="action-btn" id="btn-download">download</button>
      <button class="action-btn" id="btn-lock">lock</button>
    </div>
  </div>
</div>

<script>
  /* ── config ── change PASSWORD here ── */
const PASSWORD     = "letmein";
const SUPABASE_URL = "https://djgvlbgwxqwgcdhkqtxb.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqZ3ZsYmd3eHF3Z2NkaGtxdHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5ODEwMDAsImV4cCI6MjA4OTU1NzAwMH0.DB_NlWoE2kl0QftAUSv_eKnich04AtMAJhrhA9hjYoE";
const ROW_ID       = 1;

  const lock  = document.getElementById('lock');
  const app   = document.getElementById('app');
  const pw    = document.getElementById('pw');
  const err   = document.getElementById('pw-err');
  const editor = document.getElementById('editor');
  const wc    = document.getElementById('word-count');

  /* password check */
  pw.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (pw.value === PASSWORD) {
      lock.classList.add('hide');
      app.classList.add('show');
      setTimeout(() => editor.focus(), 350);
      err.classList.remove('show');
    } else {
      err.classList.add('show');
      pw.value = '';
      pw.style.borderColor = '#555';
      setTimeout(() => err.classList.remove('show'), 1800);
    }
  });

  /* word count */
  editor.addEventListener('input', () => {
    const words = editor.value.trim().split(/\s+/).filter(Boolean).length;
    wc.textContent = words + (words === 1 ? ' word' : ' words');
  });

  /* copy */
  document.getElementById('btn-copy').addEventListener('click', () => {
    navigator.clipboard.writeText(editor.value);
    const b = document.getElementById('btn-copy');
    b.textContent = 'copied';
    setTimeout(() => b.textContent = 'copy', 1200);
  });

  /* clear */
  document.getElementById('btn-clear').addEventListener('click', () => {
    if (!editor.value) return;
    if (confirm('clear everything?')) {
      editor.value = '';
      wc.textContent = '0 words';
    }
  });

  /* download */
  document.getElementById('btn-download').addEventListener('click', () => {
    const blob = new Blob([editor.value], { type: 'text/plain' });
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(blob),
      download: 'write-' + Date.now() + '.txt'
    });
    a.click();
    URL.revokeObjectURL(a.href);
  });

  /* lock */
  document.getElementById('btn-lock').addEventListener('click', () => {
    app.classList.remove('show');
    lock.classList.remove('hide');
    pw.value = '';
    setTimeout(() => pw.focus(), 300);
  });
</script>
</body>
</html>
