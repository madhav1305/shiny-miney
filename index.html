<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>write.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --fg: #d4d4d4;
    --dim: #444;
    --dim2: #2a2a2a;
    --font: 'Geist Mono', 'Courier New', monospace;
  }

  html, body { height: 100%; background: var(--bg); color: var(--fg); font-family: var(--font); font-weight: 300; font-size: 15px; line-height: 1.7; overflow: hidden; }

  #lock {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 10;
    background: var(--bg); transition: opacity .3s ease;
  }
  #lock.hide { opacity: 0; pointer-events: none; }
  #lock-label { font-size: 11px; letter-spacing: .15em; color: var(--dim); margin-bottom: 18px; }
  #pw {
    background: none; border: none; border-bottom: 1px solid var(--dim);
    color: var(--fg); font-family: var(--font); font-size: 15px; font-weight: 300;
    width: 220px; text-align: center; outline: none; padding: 6px 0;
    letter-spacing: .1em; caret-color: var(--fg); transition: border-color .2s;
  }
  #pw:focus { border-color: var(--fg); }
  #pw-err { font-size: 11px; color: var(--dim); margin-top: 14px; letter-spacing: .05em; opacity: 0; transition: opacity .2s; }
  #pw-err.show { opacity: 1; }

  #app { position: fixed; inset: 0; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity .3s ease; }
  #app.show { opacity: 1; pointer-events: all; }

  #topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 48px 0;
  }
  @media (max-width: 600px) { #topbar { padding: 14px 20px 0; } }
  #topbar-title { font-size: 11px; color: var(--dim); letter-spacing: .12em; }
  #topbar-actions { display: flex; gap: 18px; }
  .top-btn {
    font-family: var(--font); font-size: 11px; color: var(--dim); background: none;
    border: none; cursor: pointer; letter-spacing: .08em; padding: 0; transition: color .15s;
  }
  .top-btn:hover { color: var(--fg); }

  #status { font-size: 10px; color: var(--dim); letter-spacing: .06em; padding: 4px 48px 0; min-height: 18px; }
  @media (max-width: 600px) { #status { padding: 4px 20px 0; } }

  #feed {
    flex: 1; overflow-y: auto; padding: 24px 48px 16px;
    display: flex; flex-direction: column; gap: 14px;
  }
  @media (max-width: 600px) { #feed { padding: 20px 20px 12px; } }
  #feed::-webkit-scrollbar { width: 0; }

  .msg { font-size: 14px; line-height: 1.75; word-break: break-word; animation: fadein .2s ease; }
  .msg .meta { font-size: 10px; color: var(--dim); letter-spacing: .06em; margin-bottom: 3px; }
  .msg .bubble { color: var(--fg); }

  @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  #empty { font-size: 12px; color: var(--dim); letter-spacing: .06em; margin: auto; text-align: center; }

  #bar {
    display: flex; align-items: flex-end; gap: 12px;
    padding: 12px 48px 22px; border-top: 1px solid #1a1a1a;
  }
  @media (max-width: 600px) { #bar { padding: 12px 20px 18px; } }

  #input {
    flex: 1; background: none; border: none; border-bottom: 1px solid var(--dim2);
    color: var(--fg); font-family: var(--font); font-size: 14px; font-weight: 300;
    outline: none; padding: 6px 0; caret-color: var(--fg); resize: none;
    line-height: 1.6; max-height: 120px; overflow-y: auto; transition: border-color .2s;
  }
  #input:focus { border-color: var(--dim); }
  #input::placeholder { color: #252525; }
  #input::-webkit-scrollbar { width: 0; }

  #send-btn {
    font-family: var(--font); font-size: 11px; font-weight: 300; color: var(--dim);
    background: none; border: none; cursor: pointer; letter-spacing: .08em;
    padding: 6px 0; white-space: nowrap; transition: color .15s; flex-shrink: 0;
  }
  #send-btn:hover { color: var(--fg); }
</style>
</head>
<body>

<!-- ── CONFIGURE THESE THREE LINES ── -->
<script>
  const PASSWORD     = "letmein";
  const SUPABASE_URL = "https://djgvlbgwxqwgcdhkqtxb.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqZ3ZsYmd3eHF3Z2NkaGtxdHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5ODEwMDAsImV4cCI6MjA4OTU1NzAwMH0.DB_NlWoE2kl0QftAUSv_eKnich04AtMAJhrhA9hjYoE";
  const ROW_ID       = 1;
</script>
<!-- ──────────────────────────────── -->

<div id="lock">
  <div id="lock-label">enter password</div>
  <input id="pw" type="password" autocomplete="off" spellcheck="false" autofocus />
  <div id="pw-err">wrong password</div>
</div>

<div id="app">
  <div id="topbar">
    <span id="topbar-title">write.</span>
    <div id="topbar-actions">
      <button class="top-btn" id="btn-download">download</button>
      <button class="top-btn" id="btn-clear">clear all</button>
      <button class="top-btn" id="btn-lock">lock</button>
    </div>
  </div>
  <div id="status"></div>
  <div id="feed"><div id="empty">nothing yet. start writing.</div></div>
  <div id="bar">
    <textarea id="input" rows="1" placeholder="write something..." spellcheck="false" autocomplete="off"></textarea>
    <button id="send-btn">save ↵</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  const lock     = document.getElementById('lock');
  const app      = document.getElementById('app');
  const pwInput  = document.getElementById('pw');
  const errMsg   = document.getElementById('pw-err');
  const feed     = document.getElementById('feed');
  const input    = document.getElementById('input');
  const statusEl = document.getElementById('status');

  function setStatus(msg) { statusEl.textContent = msg; }

  function fmt(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short' }) + ' ' +
           d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  function renderMsg(row) {
    const e = document.getElementById('empty');
    if (e) e.remove();
    const div = document.createElement('div');
    div.className = 'msg';
    div.dataset.id = row.id;
    div.innerHTML = `<div class="meta">${fmt(row.created_at)}</div><div class="bubble">${escHtml(row.content)}</div>`;
    feed.appendChild(div);
    feed.scrollTop = feed.scrollHeight;
  }

  async function loadMessages() {
    setStatus('loading...');
    const { data, error } = await db.from('messages').select('*').order('created_at', { ascending: true });
    if (error) { setStatus('error — check console'); console.error(error); return; }
    feed.innerHTML = '';
    if (!data.length) {
      feed.innerHTML = '<div id="empty">nothing yet. start writing.</div>';
    } else {
      data.forEach(renderMsg);
    }
    setStatus('');
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    autoResize();
    setStatus('saving...');
    const { error } = await db.from('messages').insert({ content: text });
    if (error) { setStatus('error saving — check console'); console.error(error); }
    else setStatus('');
  }

  function subscribeRealtime() {
    db.channel('messages-feed')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
        renderMsg(payload.new);
      })
      .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' }, () => {
        loadMessages();
      })
      .subscribe();
  }

  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  }
  input.addEventListener('input', autoResize);

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.getElementById('send-btn').addEventListener('click', sendMessage);

  pwInput.addEventListener('keydown', async e => {
    if (e.key !== 'Enter') return;
    if (pwInput.value === PASSWORD) {
      lock.classList.add('hide');
      app.classList.add('show');
      pwInput.value = '';
      errMsg.classList.remove('show');
      await loadMessages();
      subscribeRealtime();
      setTimeout(() => input.focus(), 350);
    } else {
      errMsg.classList.add('show');
      pwInput.value = '';
      setTimeout(() => errMsg.classList.remove('show'), 1800);
    }
  });

  document.getElementById('btn-download').addEventListener('click', async () => {
    const { data } = await db.from('messages').select('*').order('created_at', { ascending: true });
    const text = data.map(r => `[${fmt(r.created_at)}]\n${r.content}`).join('\n\n');
    const blob = new Blob([text], { type: 'text/plain' });
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(blob), download: 'write-' + Date.now() + '.txt'
    });
    a.click();
    URL.revokeObjectURL(a.href);
  });

  document.getElementById('btn-clear').addEventListener('click', async () => {
    if (!confirm('delete everything?')) return;
    await db.from('messages').delete().neq('id', 0);
    feed.innerHTML = '<div id="empty">nothing yet. start writing.</div>';
  });

  document.getElementById('btn-lock').addEventListener('click', () => {
    app.classList.remove('show');
    lock.classList.remove('hide');
    pwInput.value = '';
    setTimeout(() => pwInput.focus(), 300);
  });
</script>
</body>
</html>
